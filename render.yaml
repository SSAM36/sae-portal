services:
  - type: web
    name: sae-portal-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: TEAM_CREDENTIALS_JSON
        sync: false
      - key: FRONTEND_URLS
        sync: false
